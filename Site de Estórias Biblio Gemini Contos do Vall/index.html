<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contos do Valdir | Storybook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .gradient-text { background: linear-gradient(135deg, #1e293b 0%, #7c3aed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-6xl mx-auto mb-16 text-center relative pt-10">
        <div class="inline-flex items-center gap-2 mb-4">
            <span class="text-xs font-bold tracking-[0.3em] text-slate-400 uppercase">✨ Bibliogemini</span>
        </div>
        <h1 class="text-6xl md:text-8xl font-black mb-6 tracking-tight text-slate-900">
            Contos do <span class="gradient-text">Valdir</span>
        </h1>
        <p class="text-xl md:text-2xl text-slate-500 italic font-medium max-w-2xl mx-auto leading-relaxed">
            "Onde a realidade se desdobra em narrativas."
        </p>
        
        <div class="mt-12 flex flex-col md:flex-row items-center justify-center gap-4">
            <input type="text" id="searchInput" placeholder="Pesquisar portais..." 
                class="w-full md:w-96 px-6 py-4 rounded-2xl border border-slate-200 bg-white shadow-sm focus:ring-2 focus:ring-purple-500 outline-none transition-all">
            <button onclick="toggleForm()" class="w-full md:w-auto px-8 py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 shadow-lg hover:shadow-indigo-200 transition-all">
                + Novo Conto
            </button>
        </div>
    </header>

    <section id="formSection" class="hidden max-w-2xl mx-auto mb-16 bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
        <h2 id="formTitle" class="text-2xl font-bold mb-6 text-slate-800">Nova Jornada no Storybook</h2>
