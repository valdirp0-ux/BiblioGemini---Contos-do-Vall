<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTOS DO VALL | Storybook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
        /* VISUAL RIGOROSAMENTE FIEL */
        .bibliogemini { font-size: 14px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .titulo-vall { font-size: 4.5rem; font-weight: 900; color: #1e293b; letter-spacing: -0.05em; text-transform: uppercase; margin-bottom: 20px; }
        .subtitulo { color: #64748b; font-style: italic; font-size: 1.2rem; margin-bottom: 50px; }
        .search-input { width: 100%; max-width: 450px; padding: 18px 30px; border-radius: 25px; border: 1px solid #e2e8f0; outline: none; margin-bottom: 35px; }
        .btn-novo { background: #4f46e5; color: white; padding: 18px 50px; border-radius: 20px; font-weight: 800; font-size: 1.1rem; border: none; cursor: pointer; transition: 0.3s; }
        
        #storiesGrid { display: grid; grid-template-cols: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; width: 100%; max-width: 1200px; margin-top: 60px; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <span class="bibliogemini"><span style="color:#f59e0b">✨</span> BIBLIOGEMINI</span>
    <h1 class="titulo-vall">CONTOS DO VALL</h1>
    <p class="subtitulo">"Onde a realidade se desdobra em narrativas."</p>

    <input type="text" class="search-input" placeholder="Pesquisar portais...">
    <button class="btn-novo" onclick="abrirModal()">+ Novo Conto</button>

    <div id="storiesGrid"></div>

    <div id="modal">
        <div style="background: white; padding: 40px; border-radius: 35px; width: 90%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
            <h2 style="font-weight: 900; font-size: 1.8rem; margin-bottom: 25px;">Nova Jornada</h2>
            
            <select id="novoTema" style="width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #e2e8f0; font-weight: 600;">
                <option value="METAFÍSICA">Metafísica</option>
                <option value="ESPIRITUALIDADE">Espiritualidade</option>
                <option value="FICÇÃO">Ficção</option>
            </select>

            <input type="text" id="novoTitulo" placeholder="Título" style="width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #e2e8f0;">
            <textarea id="novoResumo" placeholder="Resumo" style="width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #e2e8f0; height: 100px;"></textarea>
            <input type="text" id="novoLink" placeholder="Link do Gemini" style="width: 100%; padding: 14px; margin-bottom: 30px; border-radius: 15px; border: 1px solid #e2e8f0;">
            
            <div style="display: flex; gap: 15px;">
                <button onclick="salvarConto()" style="flex: 1; background: #4f46e5; color: white; padding: 18px; border-radius: 15px; font-weight: bold;">Salvar</button>
                <button onclick="fecharModal()" style="padding: 18px 30px; background: #f1f5f9; border-radius: 15px; color: #64748b; font-weight: 600;">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const URL_SUPA = 'https://hnsfhpaxahgjsscmyrts.supabase.co';
        const KEY_SUPA = 'sb_publishable_mdvhMhxRnL04nV-lSz0evw_O26WVlT7';
        const supabase = window.supabase.createClient(URL_SUPA, KEY_SUPA);

        window.abrirModal = () => { document.getElementById('modal').style.display = 'flex'; };
        window.fecharModal = () => { document.getElementById('modal').style.display = 'none'; };

        async function carregar() {
            const { data, error } = await supabase.from('Histórias').select('*');
            if (!error) renderizar(data);
        }

        function renderizar(contos) {
            const grid = document.getElementById('storiesGrid');
            grid.innerHTML = contos.map(c => `
                <div style="background: white; padding: 35px; border-radius: 40px; border: 1px solid #f1f5f9; display: flex; flex-direction: column;">
                    ${c.url_capa ? `<img src="${c.url_capa}" style="width: 100%; height: 180px; object-fit: cover; border-radius: 25px; margin-bottom: 25px;">` : ''}
                    <span style="font-size: 10px; font-weight: 900; color: #7c3aed; text-transform: uppercase; margin-bottom: 10px;">${c.Tema || 'GERAL'}</span>
                    <h3 style="font-weight: 800; font-size: 1.6rem; color: #1e293b; margin-bottom: 15px;">${c.Titulo}</h3>
                    <p style="color: #64748b; line-height: 1.7; margin-bottom: 25px; flex-grow: 1;">${c.Resumo}</p>
                    <div style="text-align: right;">
                        <a href="${c.Url}" target="_blank" style="color: #4f46e5; font-weight: 900; font-size: 13px; text-decoration: none;">LER NO GEMINI ↗</a>
                    </div>
                </div>
            `).join('');
        }

        window.salvarConto = async function() {
            const t = document.getElementById('novoTitulo').value;
            const r = document.getElementById('novoResumo').value;
            const tema = document.getElementById('novoTema').value;
            const link = document.getElementById('novoLink').value;

            // RESOLVE O ERRO DE TEMA DO SUPABASE
            const { error } = await supabase.from('Histórias').insert([{ Titulo: t, Resumo: r, Tema: tema, Url: link }]);
            if (error) alert("Erro: " + error.message);
            else { fecharModal(); carregar(); }
        }
        carregar();
    </script>
</body>
</html>
