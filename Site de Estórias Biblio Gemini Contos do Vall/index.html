<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTOS DO VALL</title>
    <meta property="og:title" content="CONTOS DO VALL">
    <meta property="og:description" content="Onde a realidade se desdobra em narrativas.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1464802686167-b939a67e06a1?q=80&w=1000">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .titulo-vall { font-size: 2.8rem; font-weight: 900; color: #1e293b; text-transform: uppercase; margin-bottom: 5px; }
        .subtitulo { color: #64748b; font-style: italic; margin-bottom: 30px; }
        .btn-novo { background: #4f46e5; color: white; padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        #storiesGrid { display: grid; grid-template-cols: 1fr 1fr; gap: 20px; width: 100%; max-width: 1000px; margin-top: 40px; }
        .card-conto { background: white; border-radius: 20px; border: 1px solid #e2e8f0; display: flex; padding: 15px; gap: 15px; height: 180px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .img-quadro { width: 110px; min-width: 110px; height: 100%; border-radius: 12px; object-fit: cover; background: #f1f5f9; }
        .conteudo { display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; width: 100%; }
        .tema-tag { font-size: 9px; font-weight: 900; color: #7c3aed; text-transform: uppercase; }
        .titulo-conto { font-weight: 800; font-size: 1.1rem; color: #1e293b; }
        .resumo-conto { font-size: 0.8rem; color: #64748b; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .link-portal { font-size: 10px; font-weight: 900; color: #4f46e5; text-transform: uppercase; text-decoration: none; align-self: flex-end; }
        @media (max-width: 768px) { #storiesGrid { grid-template-cols: 1fr; } }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <h1 class="titulo-vall">CONTOS DO VALL</h1>
    <p class="subtitulo">"Onde a realidade se desdobra em narrativas."</p>
    <button class="btn-novo" onclick="abrirModal()">+ Novo Conto</button>

    <div id="storiesGrid"></div>

    <div id="modal" onclick="if(event.target == this) fecharModal()">
        <div style="background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 400px;">
            <h2 style="font-weight: 900; font-size: 1.5rem; margin-bottom: 20px;">Nova Jornada</h2>
            
            <input type="text" id="campoTitulo" placeholder="Título do Conto" style="width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #e2e8f0;">
            <input type="text" id="campoTema" placeholder="Tema (Ex: Metafísica, Ficção)" style="width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #e2e8f0;">
            <input type="text" id="campoCapa" placeholder="Link da Imagem (URL)" style="width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #e2e8f0;">
            <textarea id="campoResumo" placeholder="Resumo..." style="width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #e2e8f0; height: 60px;"></textarea>
            <input type="text" id="campoLink" placeholder="Link do Portal Gemini" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #e2e8f0;">
            
            <div style="display: flex; gap: 10px;">
                <button onclick="salvarConto()" style="flex: 2; background: #4f46e5; color: white; padding: 14px; border-radius: 12px; font-weight: bold;">Salvar</button>
                <button onclick="fecharModal()" style="flex: 1; background: #f1f5f9; color: #64748b; padding: 14px; border-radius: 12px; font-weight: bold;">Sair</button>
            </div>
        </div>
    </div>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const URL_S = 'https://hnsfhpaxahgjsscmyrts.supabase.co';
    const KEY_S = 'sb_publishable_mdvhMhxRnL04nV-lSz0evw_O26WVlT7';
    const supa = window.supabase.createClient(URL_S, KEY_S);

    window.abrirModal = () => document.getElementById('modal').style.display = 'flex';
    window.fecharModal = () => document.getElementById('modal').style.display = 'none';

    async function carregarContos() {
        // Busca simples sem filtros para garantir o carregamento
        const { data, error } = await supa.from('Histórias').select('*');
        if (error) {
            console.error("Erro ao carregar:", error.message);
        } else {
            renderizar(data);
        }
    }

    function renderizar(contos) {
        const grid = document.getElementById('storiesGrid');
        if (!contos || contos.length === 0) return;
        
        grid.innerHTML = contos.map(c => `
            <div class="card-conto">
                <img src="${c.url_capa || 'https://images.unsplash.com/photo-1464802686167-b939a67e06a1?w=400'}" class="img-quadro">
                <div class="conteudo">
                    <div>
                        <span class="tema-tag">${c.Tema || 'GERAL'}</span>
                        <h3 class="titulo-conto">${c.Titulo}</h3>
                        <p class="resumo-conto">${c.Resumo}</p>
                    </div>
                    <a href="${c.Url}" target="_blank" class="link-portal">ABRIR PORTAL ↗</a>
                </div>
            </div>
        `).join('');
    }

    window.salvarConto = async function() {
        const t = document.getElementById('campoTitulo').value;
        const tema = document.getElementById('campoTema').value;
        const r = document.getElementById('campoResumo').value;
        const l = document.getElementById('campoLink').value;
        const c = document.getElementById('campoCapa').value;

        if(!t || !tema || !r) return alert("Por favor, preencha Título, Tema e Resumo!");

        // AJUSTE CRUCIAL: Nomes das colunas idênticos ao Supabase
        const { error } = await supa.from('Histórias').insert([
            { 
                Titulo: t,      // 'T' Maiúsculo
                Tema: tema,     // 'T' Maiúsculo
                Resumo: r,      // 'R' Maiúsculo
                Url: l,         // 'U' Maiúsculo
                url_capa: c     // TUDO MINÚSCULO
            }
        ]);

        if (error) {
            alert("Erro ao salvar: " + error.message);
            console.error("Erro Supabase:", error);
        } else {
            alert("Conto '" + t + "' salvo com sucesso!");
            fecharModal();
            carregarContos();
            limpar();
        }
    }

    function limpar() {
        document.getElementById('campoTitulo').value = '';
        document.getElementById('campoTema').value = '';
        document.getElementById('campoResumo').value = '';
        document.getElementById('campoLink').value = '';
        document.getElementById('campoCapa').value = '';
    }

    document.addEventListener('DOMContentLoaded', carregarContos);
</script>
</body>
</html>
