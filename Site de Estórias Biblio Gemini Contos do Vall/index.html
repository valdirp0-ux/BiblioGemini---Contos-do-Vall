<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTOS DO VALL | Storybook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .bibliogemini { font-size: 14px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .titulo-vall { font-size: 3.5rem; font-weight: 900; color: #1e293b; margin-bottom: 20px; text-align: center; }
        .subtitulo { color: #64748b; font-style: italic; font-size: 1.2rem; margin-bottom: 40px; }
        .search-container { width: 100%; max-width: 450px; position: relative; margin-bottom: 30px; }
        .search-input { width: 100%; padding: 15px 25px; border-radius: 20px; border: 1px solid #e2e8f0; outline: none; font-size: 1rem; color: #64748b; }
        .btn-novo { background: #4f46e5; color: white; padding: 15px 40px; border-radius: 15px; font-weight: 800; border: none; cursor: pointer; transition: 0.3s; }
        .btn-novo:hover { background: #4338ca; transform: translateY(-2px); }
        #storiesGrid { display: grid; grid-template-cols: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; width: 100%; max-width: 1100px; margin-top: 50px; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <span class="bibliogemini">✨ BIBLIOGEMINI</span>
    <h1 class="titulo-vall">CONTOS DO VALL</h1>
    <p class="subtitulo">"Onde a realidade se desdobra em narrativas."</p>

    <div class="search-container">
        <input type="text" class="search-input" placeholder="Pesquisar portais...">
    </div>

    <button class="btn-novo" onclick="abrirModal()">+ Novo Conto</button>

    <div id="storiesGrid"></div>

    <div id="modal">
        <div style="background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 450px;">
            <h2 style="font-weight: 800; font-size: 1.5rem; margin-bottom: 20px;">Nova Jornada</h2>
            <select id="novoTema" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">
                <option value="METAFÍSICA">Metafísica</option>
                <option value="ESPIRITUALIDADE">Espiritualidade</option>
                <option value="FICÇÃO">Ficção</option>
            </select>
            <input type="text" id="novoTitulo" placeholder="Título" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">
            <textarea id="novoResumo" placeholder="Resumo" style="width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:1px solid #ddd; height:100px;"></textarea>
            <div style="display: flex; gap: 10px;">
                <button onclick="salvarConto()" style="flex:1; padding:15px; background:#4f46e5; color:white; border-radius:12px; font-weight:bold; border:none;">Salvar</button>
                <button onclick="fecharModal()" style="padding:15px; background:#f1f5f9; border-radius:12px; border:none; color:#64748b;">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const URL_SUPA = 'https://hnsfhpaxahgjsscmyrts.supabase.co';
        const KEY_SUPA = 'sb_publishable_mdvhMhxRnL04nV-lSz0evw_O26WVlT7';
        const supabase = window.supabase.createClient(URL_SUPA, KEY_SUPA);

        function abrirModal() { document.getElementById('modal').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modal').style.display = 'none'; }

        async function carregar() {
            // Removida a tentativa de ler Created_at que não existe
            const { data, error } = await supabase.from('Histórias').select('Titulo, Resumo, Tema, url_capa, Url');
            if (error) return console.error(error);
            renderizar(data);
        }

        function renderizar(contos) {
            const grid = document.getElementById('storiesGrid');
            grid.innerHTML = contos.map(c => `
                <div style="background:white; padding:25px; border-radius:25px; border:1px solid #e2e8f0; shadow:sm;">
                    ${c.url_capa ? `<img src="${c.url_capa}" style="width:100%; border-radius:15px; margin-bottom:15px;">` : ''}
                    <span style="font-size:10px; font-weight:900; color:#4f46e5;">${c.Tema || 'GERAL'}</span>
                    <h3 style="font-weight:800; font-size:1.3rem; margin:10px 0;">${c.Titulo}</h3>
                    <p style="color:#64748b; font-size:0.95rem; line-height:1.5;">${c.Resumo}</p>
                </div>
            `).join('');
        }

        async function salvarConto() {
            const t = document.getElementById('novoTitulo').value;
            const r = document.getElementById('novoResumo').value;
            const tema = document.getElementById('novoTema').value;
            // Incluindo Tema para evitar erro de constraint
            const { error } = await supabase.from('Histórias').insert([{ Titulo: t, Resumo: r, Tema: tema }]);
            if (error) alert(error.message);
            else { fecharModal(); carregar(); }
        }

        carregar();
    </script>
</body>
</html>
