<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contos do Valdir | Storybook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; padding: 20px; }
        .grid-contos { display: grid; grid-template-cols: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        #modal { background: rgba(0,0,0,0.5); position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <header style="text-align: center; margin-bottom: 50px;">
        <h1 style="font-size: 3rem; font-weight: 800; color: #1e293b;">Contos do Valdir</h1>
        <p style="color: #64748b; font-style: italic;">"Onde a realidade se desdobra em narrativas."</p>
        <div style="margin-top: 30px;">
            <button onclick="abrirModal()" style="background: #4f46e5; color: white; padding: 15px 30px; border-radius: 12px; font-weight: bold;">+ Novo Conto</button>
        </div>
    </header>

    <div id="storiesGrid" class="grid-contos"></div>

    <div id="modal">
        <div style="background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 500px;">
            <h2 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 20px;">Nova Jornada</h2>
            
            <select id="novoTema" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; background: white;">
    <option value="METAFÍSICA">Metafísica</option>
    <option value="ESPIRITUALIDADE">Espiritualidade</option>
    <option value="FICÇÃO">Ficção</option>
</select>

            <input type="text" id="novoTitulo" placeholder="Título" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px;">
            <textarea id="novoResumo" placeholder="Resumo" style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; height: 100px;"></textarea>
            
            <div style="display: flex; gap: 10px;">
                <button onclick="salvarConto()" style="flex: 1; background: #4f46e5; color: white; padding: 10px; border-radius: 8px; font-weight: bold;">Salvar</button>
                <button onclick="fecharModal()" style="padding: 10px; background: #f1f5f9; border-radius: 8px;">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const URL_SUPA = 'https://hnsfhpaxahgjsscmyrts.supabase.co';
        const KEY_SUPA = 'sb_publishable_mdvhMhxRnL04nV-lSz0evw_O26WVlT7';
        const supabase = window.supabase.createClient(URL_SUPA, KEY_SUPA);

        let stories = [];

        function abrirModal() { document.getElementById('modal').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modal').style.display = 'none'; }

        // SUA FUNÇÃO ORIGINAL (MANTIDA)
        async function carregar() {
            const { data, error } = await supabase
                .from('Histórias') 
                .select('*'); 

            if (error) { console.error('Erro:', error); return; }
            stories = data;
            renderizar();
        }

        // SUA FUNÇÃO DE RENDERIZAR (MANTIDA COM AS CLASSES DO TAILWIND)
       function renderizar() {
    const grid = document.getElementById('storiesGrid');
    grid.innerHTML = stories.map(s => `
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 hover:shadow-md transition-all group">
            ${s.url_capa ? `<img src="${s.url_capa}" class="w-full h-40 object-cover rounded-2xl mb-4">` : ''}
            <div class="flex items-center gap-2 mb-2">
                <span class="text-[10px] font-bold uppercase tracking-widest text-purple-500">${s.Tema || 'Geral'}</span>
            </div>
            <h3 class="text-2xl font-bold text-slate-800 mb-4 group-hover:text-purple-600 transition-colors">${s.Titulo}</h3>
            <p class="text-slate-600 leading-relaxed mb-6 line-clamp-4">${s.Resumo}</p>
            <div class="flex justify-end gap-3 pt-4 border-t border-slate-50">
                <a href="${s.Url}" target="_blank" class="text-sm font-bold text-indigo-600 hover:underline">Ler no Gemini</a>
            </div>
        </div>
    `).join('');
}

        // CAMBIO 2: Ajuste na função salvar para incluir o Tema
        async function salvarConto() {
    const t = document.getElementById('novoTitulo').value;
    const r = document.getElementById('novoResumo').value;
    const tema = document.getElementById('novoTema').value; // Linha nova

    // Enviando o Tema para o banco não dar erro
    const { error } = await supabase.from('Histórias').insert([
        { Titulo: t, Resumo: r, Tema: tema }
    ]);

    if (error) {
        alert("Erro: " + error.message);
    } else {
        fecharModal();
        carregar(); // Recarrega a Cora e os novos contos
        document.getElementById('novoTitulo').value = '';
        document.getElementById('novoResumo').value = '';
    }
}

        carregar();
    </script>
</body>
</html>
