<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 1. CONEXÃO (Não mude nada aqui, sua chave já está certa)
    const URL_S = 'https://hnsfhpaxahgjsscmyrts.supabase.co';
    const KEY_S = 'sb_publishable_mdvhMhxRnL04nV-lSz0evw_026WVlT7';
    const supa = supabase.createClient(URL_S, KEY_S);

    let todosOsContos = [];

    // 2. FUNÇÃO PARA ABRIR/FECHAR O MODAL
    window.abrirModal = () => document.getElementById('modal').style.display = 'flex';
    window.fecharModal = () => document.getElementById('modal').style.display = 'none';

    // 3. CARREGAR OS DADOS DO BANCO
    async function carregarContos() {
        const { data, error } = await supa.from('Histórias').select('*');
        
        if (error) {
            console.error("Erro ao buscar:", error.message);
        } else {
            todosOsContos = data;
            renderizar(data);
            
            // Limpeza automática de rascunhos vazios
            await supa.from('Histórias').delete().is('Titulo', null);
            await supa.from('Histórias').delete().eq('Titulo', '');
        }
    }

    // 4. DESENHAR OS CARDS (Usando os nomes que estão no seu CSS)
    function renderizar(contos) {
        const grid = document.getElementById('storiesGrid');
        if (!grid) return;
        grid.innerHTML = "";

        contos.forEach(c => {
            const div = document.createElement('div');
            div.className = 'card-conto'; // Nome que está no seu <style>
            div.innerHTML = `
                <img src="${c.url_capa || 'https://via.placeholder.com/150'}" class="img-quadro">
                <div class="conteudo">
                    <div>
                        <span class="tema-tag">${c.Tema || 'Geral'}</span>
                        <h2 class="titulo-conto">${c.Titulo}</h2>
                        <p class="resumo-conto">${c.Resumo || ''}</p>
                    </div>
                    <a href="${c.Url}" target="_blank" class="link-portal">ABRIR PORTAL ↗</a>
                </div>
            `;
            grid.appendChild(div);
        });
    }

    // 5. BUSCA (ID corrigido para inputBusca)
    window.filtrarContos = function() {
        const termo = document.getElementById('inputBusca').value.toLowerCase();
        const filtrados = todosOsContos.filter(c => {
            const titulo = (c.Titulo || "").toLowerCase();
            const tema = (c.Tema || "").toLowerCase();
            return titulo.includes(termo) || tema.includes(termo);
        });
        renderizar(filtrados);
    };

    // 6. INICIALIZAR
    carregarContos();

    // Lógica para o botão de Admin aparecer
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('admin') === 'true') {
        const btn = document.getElementById('btnAdmin');
        if (btn) btn.style.display = 'block';
    }
</script>
