<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTOS DO VALL | Storybook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        /* PADRÃO VISUAL EXATO DA ÚLTIMA IMAGEM */
        .bibliogemini { font-size: 14px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .titulo-vall { font-size: 4.2rem; font-weight: 900; color: #1e293b; letter-spacing: -0.05em; text-transform: uppercase; margin-bottom: 15px; }
        .subtitulo { color: #64748b; font-style: italic; font-size: 1.1rem; margin-bottom: 40px; }
        
        .search-input { width: 100%; max-width: 450px; padding: 15px 25px; border-radius: 20px; border: 1px solid #e2e8f0; outline: none; margin-bottom: 30px; }
        .btn-novo { background: #4f46e5; color: white; padding: 18px 45px; border-radius: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        
        #storiesGrid { display: grid; grid-template-cols: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; width: 100%; max-width: 1200px; margin-top: 50px; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <span class="bibliogemini">✨ BIBLIOGEMINI</span>
    <h1 class="titulo-vall">CONTOS DO VALL</h1>
    <p class="subtitulo">"Onde a realidade se desdobra em narrativas."</p>

    <input type="text" class="search-input" placeholder="Pesquisar portais...">
    <button class="btn-novo" onclick="abrirModal()">+ Novo Conto</button>

    <div id="storiesGrid"></div>

  <div id="modal">
    <div style="background: white; padding: 40px; border-radius: 30px; width: 90%; max-width: 500px;">
        <h2 style="font-weight: 900; font-size: 1.8rem; margin-bottom: 25px;">Nova Jornada</h2>
        
        <select id="novoTema" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0; font-weight: 600;">
            <option value="METAFÍSICA">Metafísica</option>
            <option value="ESPIRITUALIDADE">Espiritualidade</option>
            <option value="FICÇÃO">Ficção</option>
        </select>

        <input type="text" id="novoTitulo" placeholder="Título do Conto" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0;">
        <textarea id="novoResumo" placeholder="Resumo" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0; height: 100px;"></textarea>
        
        <input type="text" id="novoLink" placeholder="Link do Gemini (https://...)" style="width: 100%; padding: 12px; margin-bottom: 25px; border-radius: 12px; border: 1px solid #e2e8f0;">
        
        <div style="display: flex; gap: 10px;">
            <button onclick="salvarConto()" style="flex: 1; background: #4f46e5; color: white; padding: 15px; border-radius: 12px; font-weight: bold;">Salvar no Storybook</button>
            <button onclick="fecharModal()" style="padding: 15px 25px; background: #f1f5f9; border-radius: 12px; color: #64748b; font-weight: 600;">Cancelar</button>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const URL_SUPA = 'https://hnsfhpaxahgjsscmyrts.supabase.co';
        const KEY_SUPA = 'sb_publishable_mdvhMhxRnL04nV-lSz0evw_O26WVlT7';
        const supabase = window.supabase.createClient(URL_SUPA, KEY_SUPA);

        function abrirModal() { document.getElementById('modal').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modal').style.display = 'none'; }

        async function carregar() {
            const { data, error } = await supabase.from('Histórias').select('*');
            if (error) return;
            renderizar(data);
        }

        function renderizar(contos) {
            const grid = document.getElementById('storiesGrid');
            grid.innerHTML = contos.map(c => `
                <div style="background: white; padding: 30px; border-radius: 35px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                    ${c.url_capa ? `<img src="${c.url_capa}" style="width: 100%; h-44; object-fit: cover; border-radius: 20px; margin-bottom: 20px;">` : ''}
                    <span style="font-size: 10px; font-weight: 900; color: #7c3aed; text-transform: uppercase;">${c.Tema || 'GERAL'}</span>
                    <h3 style="font-weight: 800; font-size: 1.6rem; color: #1e293b; margin: 10px 0;">${c.Titulo}</h3>
                    <p style="color: #64748b; line-height: 1.6; margin-bottom: 20px;">${c.Resumo}</p>
                    <a href="${c.Url}" target="_blank" style="color: #4f46e5; font-weight: 900; font-size: 12px; text-decoration: none;">LER NO GEMINI ↗</a>
                </div>
            `).join('');
        }

       async function salvarConto() {
    const t = document.getElementById('novoTitulo').value;
    const r = document.getElementById('novoResumo').value;
    const tema = document.getElementById('novoTema').value; // Pega o tema selecionado
    const link = document.getElementById('novoLink').value; // Pega o link

    // AGORA ENVIA O TEMA E A URL, RESOLVENDO O ERRO
    const { error } = await supabase.from('Histórias').insert([
        { Titulo: t, Resumo: r, Tema: tema, Url: link }
    ]);

    if (error) {
        alert("Erro ao salvar: " + error.message);
    } else {
        fecharModal();
        carregar(); // Atualiza a página com o novo conto
    }
}
        carregar();
    </script>
</body>
</html>
