<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioGemini - Contos do Vall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card-gradiente { background: white; transition: all 0.3s ease; }
        .card-gradiente:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-6xl mx-auto mb-10 text-center">
        <img src="logo.png" alt="Logo" class="mx-auto mb-4 max-w-[280px] w-full h-auto" onerror="this.style.display='none'">
        <h1 class="text-4xl font-extrabold text-indigo-700 mb-2">BiblioGemini - Contos do Vall</h1>
        <p class="text-slate-500 italic text-lg mb-8">Diretório de histórias e transmutação de ideias.</p>
        
        <div class="flex flex-col md:flex-row gap-4 justify-center items-center">
            <input type="text" id="searchInput" placeholder="Pesquisar contos..." 
                class="w-full md:w-96 p-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-400 outline-none shadow-sm transition">
            <button onclick="toggleForm()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-2xl font-bold shadow-lg transition-all w-full md:w-auto">
                + Novo Conto
            </button>
        </div>
    </header>

    <section id="formSection" class="hidden max-w-2xl mx-auto mb-16 bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
        <h2 class="text-2xl font-bold mb-6 text-center text-indigo-600">Cadastrar Nova História</h2>
        <form id="storyForm" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="title" placeholder="Título da História" required class="p-3 border rounded-xl outline-none focus:border-indigo-500">
                <select id="theme" required class="p-3 border rounded-xl outline-none focus:border-indigo-500 bg-white">
                    <option value="">Escolha o Tema</option>
                    <option value="Ficção">Ficção</option>
                    <option value="Fantasia">Fantasia</option>
                    <option value="Espiritualidade">Espiritualidade</option>
                    <option value="Isekai">Isekai</option>
                </select>
            </div>
            <textarea id="summary" placeholder="Resumo da história..." rows="3" required class="w-full p-3 border rounded-xl outline-none focus:border-indigo-500"></textarea>
            <input type="url" id="url" placeholder="Link do Gemini" required class="w-full p-3 border rounded-xl outline-none focus:border-indigo-500">
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-xl font-bold transition">Publicar no Vall</button>
        </form>
    </section>

    <main id="storyGrid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <p class="text-center col-span-full text-slate-400 py-10">Conectando ao banco de dados...</p>
    </main>

    <script>
        // Configurações do seu Supabase
        const SUPABASE_URL = 'https://hnsfhpaxahgjsscmyrts.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_mdvhMhxRnL04nV-lSz0evw_O26WVlT7';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function carregar() {
            const { data, error } = await _supabase.from('Histórias').select('*');
            if (!error) renderizar(data);
            else console.error("Erro ao carregar:", error);
        }

        function renderizar(lista) {
            const grid = document.getElementById('storyGrid');
            grid.innerHTML = lista.length ? '' : '<p class="text-center col-span-full py-10 text-slate-400">Nenhuma história encontrada ainda.</p>';
            lista.forEach(s => {
                grid.innerHTML += `
                    <div class="card-gradiente p-7 rounded-3xl border border-slate-100 shadow-sm flex flex-col justify-between relative">
                        <div>
                            <span class="text-[10px] font-bold uppercase text-indigo-500 tracking-widest">${s.Tema}</span>
                            <h3 class="text-xl font-bold mt-1 mb-3">${s.Titulo}</h3>
                            <p class="text-slate-600 text-sm mb-6 italic line-clamp-3">"${s.Resumo}"</p>
                        </div>
                        <a href="${s.Url}" target="_blank" class="text-center bg-indigo-50 text-indigo-600 py-3 rounded-xl font-bold hover:bg-indigo-600 hover:text-white transition">Ler Completa</a>
                    </div>`;
            });
        }

        function toggleForm() { document.getElementById('formSection').classList.toggle('hidden'); }

        document.getElementById('storyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dados = {
                Titulo: document.getElementById('title').value,
                Tema: document.getElementById('theme').value,
                Resumo: document.getElementById('summary').value,
                Url: document.getElementById('url').value
            };
            const { error } = await _supabase.from('Histórias').insert([dados]);
            if (!error) {
                e.target.reset();
                toggleForm();
                carregar();
            } else {
                alert("Erro ao salvar! Verifique se os créditos do Supabase voltaram.");
            }
        });

        carregar();
    </script>
</body>
</html>
