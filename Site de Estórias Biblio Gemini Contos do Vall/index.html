<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTOS DO VALL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* CABEÇALHO */
        .titulo-vall { font-size: 2.8rem; font-weight: 900; color: #1e293b; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 5px; }
        .subtitulo { color: #64748b; font-style: italic; margin-bottom: 30px; }
        .btn-novo { background: #4f46e5; color: white; padding: 12px 25px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        .btn-novo:hover { background: #4338ca; transform: scale(1.05); }

        /* A ESTANTE: 2 COLUNAS (DIREITA E ESQUERDA) */
        #storiesGrid { 
            display: grid; 
            grid-template-cols: 1fr 1fr; /* Força dois itens por linha */
            gap: 20px; 
            width: 100%; 
            max-width: 1000px; 
            margin-top: 40px; 
        }

        /* O CARD: COMPACTO "TIPO QUADRO" */
        .card-conto { 
            background: white; 
            border-radius: 20px; 
            border: 1px solid #e2e8f0; 
            display: flex; 
            padding: 15px;
            gap: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
            height: 180px; /* Altura fixa para alinhar a estante */
        }
        .card-conto:hover { border-color: #4f46e5; transform: translateY(-5px); }

        /* IMAGEM PEQUENA */
        .img-quadro {
            width: 100px;
            min-width: 100px;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            background: #f1f5f9;
        }

        .conteudo { display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .tema-tag { font-size: 9px; font-weight: 900; color: #7c3aed; text-transform: uppercase; }
        .titulo-conto { font-weight: 800; font-size: 1.1rem; color: #1e293b; margin: 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .resumo-conto { font-size: 0.8rem; color: #64748b; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .link-portal { font-size: 10px; font-weight: 900; color: #4f46e5; text-decoration: none; text-transform: uppercase; align-self: flex-end; }

        @media (max-width: 768px) { #storiesGrid { grid-template-cols: 1fr; } } /* Ajuste para celular */

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <h1 class="titulo-vall">CONTOS DO VALL</h1>
    <p class="subtitulo">"Onde a realidade se desdobra em narrativas."</p>

    <button class="btn-novo" onclick="abrirModal()">+ Novo Conto</button>

    <div id="storiesGrid"></div>

    <div id="modal" onclick="if(event.target == this) fecharModal()">
        <div style="background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);">
            <h2 style="font-weight: 900; font-size: 1.5rem; margin-bottom: 20px; color: #1e293b;">Nova Jornada</h2>
            <select id="novoTema" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc;">
                <option value="METAFÍSICA">Metafísica</option>
                <option value="ESPIRITUALIDADE">Espiritualidade</option>
                <option value="FICÇÃO">Ficção</option>
            </select>
            <input type="text" id="novoTitulo" placeholder="Título do Conto" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0;">
            <input type="text" id="novaCapa" placeholder="URL da Imagem de Capa" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0;">
            <textarea id="novoResumo" placeholder="Breve resumo..." style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0; height: 100px; resize: none;"></textarea>
            <input type="text" id="novoLink" placeholder="Link do Portal (URL)" style="width: 100%; padding: 12px; margin-bottom: 25px; border-radius: 12px; border: 1px solid #e2e8f0;">
            
            <div style="display: flex; gap: 10px;">
                <button onclick="salvarConto()" style="flex: 2; background: #4f46e5; color: white; padding: 14px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer;">Criar Conto</button>
                <button onclick="fecharModal()" style="flex: 1; background: #f1f5f9; color: #64748b; padding: 14px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer;">Sair</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configuração do Supabase (Corrigida para evitar erro de declaração dupla)
        const URL_SUPA = 'https://hnsfhpaxahgjsscmyrts.supabase.co';
        const KEY_SUPA = 'sb_publishable_mdvhMhxRnL04nV-lSz0evw_O26WVlT7';
        const clientSupa = window.supabase.createClient(URL_SUPA, KEY_SUPA);

        // Funções Globais (Corrigidas para serem encontradas pelo HTML)
        window.abrirModal = function() { document.getElementById('modal').style.display = 'flex'; }
        window.fecharModal = function() { document.getElementById('modal').style.display = 'none'; }

        async function carregarContos() {
            const { data, error } = await clientSupa.from('Histórias').select('*').order('created_at', { ascending: false });
            if (!error) renderizar(data);
        }

        function renderizar(contos) {
            const grid = document.getElementById('storiesGrid');
            grid.innerHTML = contos.map(c => `
                <div class="card-conto">
                    <img src="${c.url_capa || 'https://via.placeholder.com/150'}" class="img-quadro" alt="Capa">
                    <div class="conteudo">
                        <div>
                            <span class="tema-tag">${c.Tema || 'GERAL'}</span>
                            <h3 class="titulo-conto">${c.Titulo}</h3>
                            <p class="resumo-conto">${c.Resumo}</p>
                        </div>
                        <a href="${c.Url}" target="_blank" class="link-portal">ABRIR PORTAL ↗</a>
                    </div>
                </div>
            `).join('');
        }

        window.salvarConto = async function() {
            const t = document.getElementById('novoTitulo').value;
            const r = document.getElementById('novoResumo').value;
            const tema = document.getElementById('novoTema').value;
            const link = document.getElementById('novoLink').value;

            if(!t || !r) return alert("Preencha título e resumo!");

            const { error } = await clientSupa.from('Histórias').insert([{ Titulo: t, Resumo: r, Tema: tema, Url: link }]);
            
            if (!error) {
                fecharModal();
                carregarContos();
                document.getElementById('novoTitulo').value = '';
                document.getElementById('novoResumo').value = '';
                document.getElementById('novoLink').value = '';
            } else {
                alert("Erro ao salvar: " + error.message);
            }
        }

        // Inicia a aplicação
        carregarContos();
    </script>
</body>
</html>
