<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTOS DO VALL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        
        .titulo-vall { font-size: 3rem; font-weight: 900; color: #1e293b; text-transform: uppercase; margin-bottom: 5px; }
        .subtitulo { color: #64748b; font-style: italic; margin-bottom: 30px; }
        .btn-novo { background: #4f46e5; color: white; padding: 10px 25px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; }
        
        /* A GRADE: 2 COLUNAS REAIS (ESQUERDA E DIREITA) */
        #storiesGrid { 
            display: grid; 
            grid-template-cols: 1fr 1fr; /* Força duas colunas iguais */
            gap: 15px; 
            width: 100%; 
            max-width: 1000px; 
            margin-top: 40px; 
        }

        /* O CARD: IMAGEM NA ESQUERDA, TEXTO NA DIREITA */
        .card-conto { 
            background: white; 
            border-radius: 20px; 
            border: 1px solid #e2e8f0; 
            display: flex; /* Alinha imagem e texto lado a lado dentro do card */
            overflow: hidden;
            height: 160px; /* Altura fixa para todos ficarem iguais e pequenos */
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .img-container {
            width: 120px; /* Largura da imagem pequena na esquerda */
            min-width: 120px;
            height: 100%;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-container {
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .tema { font-size: 9px; font-weight: 900; color: #7c3aed; text-transform: uppercase; }
        .titulo { font-weight: 800; font-size: 1.1rem; color: #1e293b; margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .resumo { font-size: 0.8rem; color: #64748b; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .ler-btn { font-size: 10px; font-weight: 900; color: #4f46e5; text-decoration: none; margin-top: 8px; align-self: flex-end; }

        @media (max-width: 800px) { #storiesGrid { grid-template-cols: 1fr; } } /* No celular vira 1 coluna */

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <h1 class="titulo-vall">CONTOS DO VALL</h1>
    <p class="subtitulo">"Onde a realidade se desdobra em narrativas."</p>

    <button class="btn-novo" onclick="abrirModal()">+ Novo Conto</button>

    <div id="storiesGrid"></div>

    <div id="modal">
        <div style="background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px;">
            <h2 style="font-weight: 900; margin-bottom: 20px;">Nova Jornada</h2>
            <select id="novoTema" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #e2e8f0;">
                <option value="METAFÍSICA">Metafísica</option>
                <option value="ESPIRITUALIDADE">Espiritualidade</option>
                <option value="FICÇÃO">Ficção</option>
            </select>
            <input type="text" id="novoTitulo" placeholder="Título" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #e2e8f0;">
            <textarea id="novoResumo" placeholder="Resumo" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #e2e8f0; height: 80px;"></textarea>
            <input type="text" id="novoLink" placeholder="Link do Gemini" style="width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #e2e8f0;">
            <div style="display: flex; gap: 10px;">
                <button onclick="salvarConto()" style="flex: 1; background: #4f46e5; color: white; padding: 12px; border-radius: 10px; font-weight: bold;">Salvar</button>
                <button onclick="fecharModal()" style="padding: 12px 20px; background: #f1f5f9; border-radius: 10px;">Sair</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const URL_SUPA = 'https://hnsfhpaxahgjsscmyrts.supabase.co';
        const KEY_SUPA = 'sb_publishable_mdvhMhxRnL04nV-lSz0evw_O26WVlT7';
        const supaClient = window.supabase.createClient(URL_SUPA, KEY_SUPA);

        window.abrirModal = () => document.getElementById('modal').style.display = 'flex';
        window.fecharModal = () => document.getElementById('modal').style.display = 'none';

        async function carregar() {
            const { data, error } = await supaClient.from('Histórias').select('*');
            if (!error) renderizar(data);
        }

        function renderizar(contos) {
            const grid = document.getElementById('storiesGrid');
            grid.innerHTML = contos.map(c => `
                <div class="card-conto">
                    <div class="img-container">
                        <img src="${c.url_capa || 'https://via.placeholder.com/150'}" alt="Capa">
                    </div>
                    <div class="info-container">
                        <span class="tema">${c.Tema || 'GERAL'}</span>
                        <h3 class="titulo">${c.Titulo}</h3>
                        <p class="resumo">${c.Resumo}</p>
                        <a href="${c.Url}" target="_blank" class="ler-btn">LER PORTAL ↗</a>
                    </div>
                </div>
            `).join('');
        }

        window.salvarConto = async function() {
            const t = document.getElementById('novoTitulo').value;
            const r = document.getElementById('novoResumo').value;
            const tema = document.getElementById('novoTema').value;
            const link = document.getElementById('novoLink').value;
            const { error } = await supaClient.from('Histórias').insert([{ Titulo: t, Resumo: r, Tema: tema, Url: link }]);
            if (!error) { fecharModal(); carregar(); }
        }
        carregar();
    </script>
</body>
</html>
